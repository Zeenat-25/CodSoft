<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Z-One — Omniscient Intelligence</title>
 
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 64 64' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='64' height='64' rx='14' fill='%231d3461'/%3E%3Cpath d='M13 17h26l-20 30h22' stroke='%233b82f6' stroke-width='4.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='44' cy='17' r='3.5' fill='%2360a5fa'/%3E%3Ccircle cx='15' cy='47' r='3.5' fill='%2360a5fa'/%3E%3C/svg%3E"/>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;500;600;700&family=Exo+2:wght@200;300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>


<div id="loginScreen">
  <div class="login-box">
    <svg class="login-logo" viewBox="0 0 64 64" fill="none">
      <rect width="64" height="64" rx="14" fill="#1d3461"/>
      <path d="M13 17h26l-20 30h22" stroke="#3b82f6" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="44" cy="17" r="3.5" fill="#60a5fa"/>
      <circle cx="15" cy="47" r="3.5" fill="#60a5fa"/>
    </svg>
    <div class="login-title">Z-ONE</div>
    <div class="login-sub">Omniscient Intelligence</div>
    <div class="login-field">
      <label>Username</label>
      <input type="text" id="loginUser" placeholder="Enter username" autocomplete="off"/>
    </div>
    <div class="login-field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="Enter password"/>
    </div>
    <div class="login-error" id="loginError"></div>
    <button class="login-btn" id="loginBtn">ACCESS Z-ONE</button>
    <div class="login-hint">Default: <strong>zone</strong> / <strong>1234</strong><br/>New username auto-registers.</div>
  </div>
</div>


<div id="app">

  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo-row">
        <svg class="logo-svg" viewBox="0 0 38 38" fill="none">
          <rect width="38" height="38" rx="9" fill="#1d3461"/>
          <path d="M8 11h16l-13 16h14" stroke="#3b82f6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="27" cy="11" r="2.2" fill="#60a5fa"/>
          <circle cx="9" cy="27" r="2.2" fill="#60a5fa"/>
        </svg>
        <div>
          <span class="logo-name">Z-One</span>
          <span class="logo-sub-text">Omniscient Intelligence</span>
        </div>
      </div>
      <button class="logout-btn" id="logoutBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Logout
      </button>
    </div>
    <div class="user-badge">
      <div class="user-avatar" id="userAvatarLetter">Z</div>
      <div>
        <div class="user-name" id="userNameDisplay">User</div>
        <div class="user-status">● Online</div>
      </div>
    </div>
    <button class="new-chat-btn" id="newChatBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      New Session
    </button>
    <div class="sidebar-section-label">Recent Sessions</div>
    <div class="chat-history-list" id="chatHistoryList"></div>
    <div class="sidebar-footer">
      <button class="clear-btn" id="clearBtn">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14H6L5 6"/>
          <line x1="10" y1="11" x2="10" y2="17"/>
          <line x1="14" y1="11" x2="14" y2="17"/>
        </svg>
        Clear All Sessions
      </button>
    </div>
  </aside>

  <button class="sidebar-toggle" id="sidebarToggle">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/>
      <line x1="3" y1="12" x2="21" y2="12"/>
      <line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>

  <main class="main-content" id="mainContent">

    <div class="video-stage" id="videoStage">
     
      <video id="zoneVideo" muted playsinline preload="auto">
        <source id="videoSrc" src="video.mp4" type="video/mp4"/>
      </video>

      
      <div class="response-card" id="responseCard">
        <div class="response-card-label">
          <span class="rc-dot"></span>Z-One
        </div>
        <div class="response-card-text" id="responseCardText"></div>
      </div>

      
      <div class="thinking-overlay" id="thinkingOverlay">
        <div class="thinking-dots"><span></span><span></span><span></span></div>
        <span class="thinking-label">Z-One is thinking</span>
      </div>

    
      <div class="video-status-bar">
        <span class="status-dot"></span>
        <span id="statusLabel">SYSTEM READY</span>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-wrapper">
        <button class="mic-btn" id="micBtn" title="Voice input">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" y1="19" x2="12" y2="23"/>
            <line x1="8" y1="23" x2="16" y2="23"/>
          </svg>
        </button>
        <textarea class="chat-input" id="chatInput" placeholder="Ask Z-One anything..." rows="1"></textarea>
        <button class="send-btn" id="sendBtn">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
      <div class="input-footer-line">
        <span>GPT-3D Enhanced</span>
        <span>Neural Engine Active</span>
        <span>AES-256 Encryption</span>
      </div>
    </div>

  </main>
</div>

<script src="script.js"></script>
</body>
</html>
